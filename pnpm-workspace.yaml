packages:
  - "packages/*"
  - "sites/*"
  - "apps/*"

allowBuilds:
  "@biomejs/biome": true
  esbuild: true
  iltorb: false
  lefthook: true
  # Next.js image optimization native binary; not needed in the
  # apps/nextjs playground (no <Image /> usage).
  sharp: false

minimumReleaseAgeExclude:
  - '@astrojs/react@5.0.7'
  - astro@6.4.3

overrides:
  fflate: "0.8.2"
